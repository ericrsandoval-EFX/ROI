<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>ROI Dashboard</title>\n    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">\n    <script src="https://unpkg.com/react@17/umd/react.production.min.js"></script>\n    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>\n    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/6.26.0/babel.min.js"></script>\n</head>\n<body class="bg-gray-100 flex items-center justify-center h-screen">\n    <div id="root"></div>\n\n    <script type="text/babel">\n        const App = () => {\n            const [investment, setInvestment] = React.useState(1000);\n            const [growthRate, setGrowthRate] = React.useState(5);\n            const [years, setYears] = React.useState(1);\n            \n            const calculateROI = (P, r, t) => P * Math.pow((1 + r / 100), t);\n            const finalAmount = calculateROI(investment, growthRate, years);\n            \n            return (\n                <div className="bg-white p-6 rounded shadow-md">\n                    <h1 className="text-xl font-bold mb-4">ROI Dashboard</h1>\n                    <label className="block mb-2">Investment Amount ($):</label>\n                    <input type="range" min="100" max="10000" value={investment} onChange={(e) => setInvestment(e.target.value)} className="w-full" />\n                    <span className="block mb-4">${investment}</span>\n                    \n                    <label className="block mb-2">Growth Rate (%):</label>\n                    <input type="range" min="1" max="20" value={growthRate} onChange={(e) => setGrowthRate(e.target.value)} className="w-full" />\n                    <span className="block mb-4">{growthRate}%</span>\n                    \n                    <label className="block mb-2">Number of Years:</label>\n                    <input type="range" min="1" max="30" value={years} onChange={(e) => setYears(e.target.value)} className="w-full" />\n                    <span className="block mb-4">{years} year(s)</span>\n                    \n                    <h2 className="text-lg font-bold">Final Amount: ${finalAmount.toFixed(2)}</h2>\n                </div>\n            );\n        };\n        ReactDOM.render(<App />, document.getElementById('root'));\n    </script>\n</body>\n</html>
